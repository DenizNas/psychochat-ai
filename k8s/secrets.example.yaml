# ============================================================
# WARNING: NEVER commit real production secrets to version control!
# ============================================================
#
# This file contains PLACEHOLDER values only.
# It is safe to commit this file to Git as a reference template.
#
# Usage:
#   1. Copy this file:
#        cp k8s/secrets.example.yaml k8s/secrets.yaml
#   2. Replace all placeholder values with real base64-encoded secrets:
#        echo -n "your_actual_secret" | base64
#   3. Apply to cluster:
#        kubectl apply -f k8s/secrets.yaml
#   4. Ensure k8s/secrets.yaml is listed in .gitignore!
#
# For production, prefer external secret managers:
#   - AWS Secrets Manager + External Secrets Operator
#   - HashiCorp Vault + vault-agent-injector
#   - GCP Secret Manager + Workload Identity
#
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: psychochat-secrets
  namespace: psychochat
  labels:
    app.kubernetes.io/name: psychochat-secrets
    app.kubernetes.io/part-of: psychochat-platform
  annotations:
    # Document when secret was last rotated (update manually on rotation)
    secret.psychochat.io/last-rotated: "2024-01-01"
    secret.psychochat.io/rotation-reminder-days: "90"
type: Opaque
data:
  # ── Application Secret Key ───────────────────────────────────────────────────
  # Generate: python -c "import secrets; print(secrets.token_hex(32))" | base64
  # Placeholder: base64("production_secret_key_placeholder_entropy_length_32")
  SECRET_KEY: cHJvZHVjdGlvbl9zZWNyZXRfa2V5X3BsYWNlaG9sZGVyX2VudHJvcHlfbGVuZ3RoXzMy

  # ── Database Connection ──────────────────────────────────────────────────────
  # Local/staging: postgresql://psikochat_user:<pass>@postgres:5432/psikochat
  # Production:    postgresql://psikochat_user:<pass>@<managed-db-host>:5432/psikochat?sslmode=require
  # Placeholder: base64("postgresql://psikochat_user:placeholder_password@postgres:5432/psikochat")
  DATABASE_URL: cG9zdGdyZXNxbDovL3BzaWtvY2hhdF91c2VyOnBsYWNlaG9sZGVyX3Bhc3N3b3JkQHBvc3RncmVzOjU0MzIvcHNpa29jaGF0

  # ── Redis Connection ─────────────────────────────────────────────────────────
  # Local/staging: redis://redis:6379/0
  # Production:    redis://<managed-redis-host>:6379/0 or rediss:// for TLS
  # Placeholder: base64("redis://redis:6379/0")
  REDIS_URL: cmVkaXM6Ly9yZWRpczo2Mzc5LzA=

  # ── Celery Broker & Result Backend ──────────────────────────────────────────
  # Should match REDIS_URL unless using separate Redis instances
  # Placeholder: base64("redis://redis:6379/0")
  CELERY_BROKER_URL: cmVkaXM6Ly9yZWRpczo2Mzc5LzA=

  # Placeholder: base64("redis://redis:6379/1") — use DB 1 for results
  CELERY_RESULT_BACKEND: cmVkaXM6Ly9yZWRpczo2Mzc5LzA=

  # ── OpenAI API Key ───────────────────────────────────────────────────────────
  # Get from: https://platform.openai.com/api-keys
  # Placeholder: base64("sk-dummy-key-placeholder-replace-me")
  OPENAI_API_KEY: c2stZHVtbXkta2V5LXBsYWNlaG9sZGVyLXJlcGxhY2UtbWU=

  # ── PostgreSQL Password ──────────────────────────────────────────────────────
  # Used by postgres-statefulset.yaml (local/staging only)
  # Production uses managed DB — this value is irrelevant but kept for parity
  # Placeholder: base64("placeholder_password")
  POSTGRES_PASSWORD: cGxhY2Vob2xkZXJfcGFzc3dvcmQ=
