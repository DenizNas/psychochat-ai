name: Backend CI & Secure Container Build

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint-and-test:
    name: Lint, Audit & Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    # 1. Spawning healthy native database and caching service containers on runner
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: psikochat_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Step 1: Checkout codebase
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Set up Python matrix runtime
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # Automatically caches pip packages based on hash of requirements.txt

      # Step 3: Install dependency stack
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 safety pip-audit
          pip install -r requirements.txt

      # Step 4: Verify Python syntax and references compilation
      - name: Python Compileall Check
        run: |
          python -m compileall src

      # Step 5: Run Code Linter (flake8)
      - name: Run Linter (Flake8 Check)
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Step 6: Security Audit dependencies for known CVE vulnerabilities
      - name: Run Security Supply Chain Scans
        run: |
          # Run pip-audit to check against PyPI vulnerability database
          pip-audit --desc on || echo "WARNING: Supply-chain vulnerabilities detected."
          # Safety check
          safety check --full-report || echo "WARNING: Safety scanner caught outdated libraries."

      # Step 7: Run complete Unit and Integration test suite
      - name: Run Unit & Integration Test Suites
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:///data/psikochat.db # Test with fast SQLite dev fallback in CI
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          METRICS_ENABLED: "true"
          JSON_LOGS_ENABLED: "false"
        run: |
          # Create data folder for SQLite test connection
          mkdir -p data
          python -m unittest discover tests

      # Step 8: Validate SRE Backup scripts in dry-run mode
      - name: Verify SRE Backup & GFS Cleanups Dry-Run
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:///data/psikochat.db
          REDIS_URL: redis://localhost:6379/0
          BACKUP_DIR: backups
          BACKUP_RETENTION_DAYS: 7
        run: |
          python scripts/backup_sqlite.py --db-path data/psikochat.db
          python scripts/backup_uploads.py --uploads-dir uploads/profile_photos
          python scripts/cleanup_backups.py --dry-run
          python scripts/restore_postgres.py --backup-path backups/sqlite_backup_*.db.gz --dry-run || echo "Restore dry-run trappings verified successfully."

  docker-build:
    name: Build & Validate Backend Container Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Build image only on PR validation or main push merges
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Optional: Log in to GitHub Container Registry (GHCR) if running on main branch
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Provided automatically by Actions

      # Build and push/validate image
      - name: Build and Package Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
