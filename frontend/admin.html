<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psikochat-AI | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1;
            --danger-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.1), transparent 25%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px;
            animation: fadeIn 1s ease-in-out;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-title {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stat-value.danger {
            color: #fca5a5;
        }

        .stat-value.primary {
            color: #818cf8;
        }

        /* Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }

        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            max-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chart-card h3 {
            width: 100%;
            margin-bottom: 20px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        @media (max-width: 900px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header class="header">
            <div class="logo-area">
                <h1>Analytics Dashboard</h1>
                <p class="subtitle">Psikochat-AI Kullanım Verileri ve İstatistikler</p>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Toplam Mesaj</div>
                <div class="stat-value" id="val-total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Kriz Algılanma Oranı</div>
                <div class="stat-value danger" id="val-crisis">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Baskın Duygu</div>
                <div class="stat-value primary" id="val-emotion" style="text-transform: capitalize;">-</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>Duygu Dağılımı</h3>
                <div class="canvas-container">
                    <canvas id="emotionChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>Günlük Kullanım</h3>
                <div class="canvas-container">
                    <canvas id="timelineChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use relative paths if hosted via FastAPI /admin, or absolute if needed
        const SUMMARY_API = "/analytics/summary";
        const TIMELINE_API = "/analytics/timeline";

        // Chart default configs
        Chart.defaults.color = "#94a3b8";
        Chart.defaults.font.family = "'Outfit', sans-serif";

        async function initDashboard() {
            try {
                // Fetch Data
                const [summaryRes, timelineRes] = await Promise.all([
                    fetch(SUMMARY_API),
                    fetch(TIMELINE_API)
                ]);

                if (!summaryRes.ok || !timelineRes.ok) throw new Error("API hatası. (Uygulama çalışmıyor veya veritabanı boş olabilir)");

                const summaryData = await summaryRes.json();
                const timelineData = await timelineRes.json();

                // 1. Update Cards
                document.getElementById("val-total").innerText = summaryData.total_messages;
                document.getElementById("val-crisis").innerText = summaryData.crisis_rate + "%";
                document.getElementById("val-emotion").innerText = summaryData.top_emotion;

                // 2. Render Pie Chart (Emotion)
                const ctxPie = document.getElementById('emotionChart').getContext('2d');
                const labelsPie = summaryData.emotion_distribution.map(item => item.emotion);
                const dataPie = summaryData.emotion_distribution.map(item => item.count);
                
                // Generated palette for pie chart
                const pieColors = ['#6366f1', '#ec4899', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#06b6d4'];

                new Chart(ctxPie, {
                    type: 'doughnut',
                    data: {
                        labels: labelsPie,
                        datasets: [{
                            data: dataPie,
                            backgroundColor: pieColors,
                            borderWidth: 0,
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    padding: 20
                                }
                            }
                        },
                        cutout: '70%'
                    }
                });

                // 3. Render Line Chart (Timeline)
                const ctxLine = document.getElementById('timelineChart').getContext('2d');
                const labelsLine = timelineData.map(item => {
                    // Format date roughly if needed
                    return item.date || "Bilinmeyen Tarih";
                });
                const dataLine = timelineData.map(item => item.count);

                new Chart(ctxLine, {
                    type: 'line',
                    data: {
                        labels: labelsLine,
                        datasets: [{
                            label: 'Mesaj Sayısı',
                            data: dataLine,
                            borderColor: '#818cf8',
                            backgroundColor: 'rgba(129, 140, 248, 0.2)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4, // smooth curves
                            pointBackgroundColor: '#fff',
                            pointBorderColor: '#818cf8',
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.05)'
                                }
                            },
                            x: {
                                grid: {
                                    display: false
                                }
                            }
                        },
                        plugins: {
                            legend: {
                                display: false
                            }
                        }
                    }
                });

            } catch (error) {
                console.error("Dashboard yüklenirken hata:", error);
            }
        }

        document.addEventListener("DOMContentLoaded", initDashboard);
    </script>
</body>
</html>
